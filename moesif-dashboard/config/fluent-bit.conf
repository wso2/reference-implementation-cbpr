[SERVICE]
    flush        1
    daemon       Off
    log_level    info
    # path to parsers config
    parsers_file /config/parsers.conf
    plugins_file /etc/fluent-bit/plugins.conf
    http_server  On
    http_listen  0.0.0.0
    http_port    2020
    storage.metrics on

[INPUT]
    Name             tail
    Tag              mtmx
    # path to dashboard logs
    Path             /logs/dashboard*.log
    Parser           json
    Refresh_Interval 1
    exit_on_eof      off

[INPUT]
    Name             tail
    Tag              ballerina_logs
    # path to ballerina logs
    Path             /logs/ballerina*.log
    Parser           ballerina_json_parser
    Refresh_Interval 1
    exit_on_eof      off

[FILTER]
    Name    lua
    Match   mtmx
    # path to lua script
    Script  /filter/dashboard-log-transform.lua
    Call    moesif_transform

[FILTER]
    Name    lua
    Match   ballerina_logs
    # path to lua script
    Script  /filter/ballerina-log-transform.lua
    Call    ballerina_transform

[OUTPUT]
    Name            http
    Match           mtmx
    Host            api.moesif.net
    Port            443
    URI             /v1/events/batch
    Format          json
    # your moesif application id
    Header          X-Moesif-Application-Id YOUR_MOESIF_APPLICATION_ID
    Header          Content-Type application/json
    tls             On
    tls.verify      On
    json_date_format iso8601

[OUTPUT]
    Name            http
    Match           ballerina_logs
    Host            api.moesif.net
    Port            443
    URI             /v1/events/batch
    Format          json
    # your moesif application id
    Header          X-Moesif-Application-Id YOUR_MOESIF_APPLICATION_ID
    Header          Content-Type application/json
    tls             On
    tls.verify      On
    json_date_format iso8601
